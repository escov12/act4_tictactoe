<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic Tac Toe</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    /* === VARIABLES === */
    :root {
      --bg:         #f5f5f0;   /* Fondo general (claro) */
      --surface:    #ffffff;   /* Fondo de tarjetas */
      --border:     #d8d8d0;   /* Bordes */
      --text:       #1a1a1a;   /* Texto principal */
      --muted:      #888;      /* Texto secundario */
      --accent:     #3a7bd5;   /* Color de acento (activo, primario) */
      --cell-alt:   #e8e8e2;   /* Color de celdas alternas */
      --win-color:  #e63946;   /* Color de línea ganadora */
      --cell-size:  105px;     /* Tamaño de cada celda */
    }

    /* === RESET === */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    /* === BODY — centrado en columna === */
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 32px 16px 48px;
      background: var(--bg);
      color: var(--text);
      font-family: 'Fredoka', sans-serif;
    }

    /*  titulo  */
    h1 {
      font-size: 2.2rem;
      font-weight: 700;
      margin-bottom: 24px;
      color: var(--text);
    }

    /*  fila compacta  */
    .config {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    /* Grupo de label y control */
    .cfg-group {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      color: var(--muted);
    }

    /* Fichas: 3 botones en fila */
    .pair-options { display: flex; gap: 6px; }

    .pair-btn {
      padding: 5px 12px;
      border-radius: 6px;
      border: 1.5px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-family: 'Fredoka', sans-serif;
      font-size: 0.85rem;
      cursor: pointer;
      transition: border-color 0.15s;
    }

    /* Botón de par seleccionado */
    .pair-btn.active {
      border-color: var(--accent);
      color: var(--accent);
      font-weight: 700;
    }

    .pair-btn:hover { border-color: var(--accent); }

    /* Input de color */
    input[type="color"] {
      width: 28px;
      height: 28px;
      border: 1.5px solid var(--border);
      border-radius: 5px;
      padding: 2px;
      background: none;
      cursor: pointer;
    }
    input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
    input[type="color"]::-webkit-color-swatch { border: none; border-radius: 3px; }

    /* Separador vertical entre grupos de config */
    .cfg-sep {
      width: 1px;
      height: 22px;
      background: var(--border);
    }

    /*  marcador y temporizador  */
    .game-bar {
      display: flex;
      align-items: center;
      gap: 0;
      width: 315px;   /* igual al tablero (3 × 105) */
      margin-bottom: 6px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      background: var(--surface);
    }

    /* Segmento del jugador */
    .score-seg {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 7px 0;
      font-size: 0.85rem;
    }

    /* Número de puntaje */
    .score-num {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--accent);
    }

    /* Divisor vertical dentro de la barra */
    .bar-div {
      width: 1px;
      height: 28px;
      background: var(--border);
    }

    /* Temporizador central */
    .timer {
      flex: 1;
      text-align: center;
      font-size: 1rem;
      font-weight: 700;
      color: #2e9c4f;   /* verde por defecto */
      transition: color 0.3s;
    }

    .timer.warn   { color: #d97706; }  /* amarillo <60s */
    .timer.danger { color: #e63946; animation: blink 0.7s ease-in-out infinite; } /* rojo <30s */

    /*  Turno  */
    .turn-bar {
      width: 315px;
      text-align: center;
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 10px;
    }

    /*  tablero */
    .board-wrap { position: relative; display: inline-block; }

    .board {
      display: grid;
      grid-template-columns: repeat(3, var(--cell-size));
      grid-template-rows: repeat(3, var(--cell-size));
    }

    /* Cada  */
    .cell {
      width: var(--cell-size);
      height: var(--cell-size);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      background: var(--surface);
      transition: background 0.12s;
      user-select: none;
    }

    /* Celdas alternas (índices 0,2,4,6,8) */
    .cell.alt { background: var(--cell-alt); }

    /* Hover solo en celdas libres */
    .cell:not(.played):hover { filter: brightness(0.95); }

    /* Celda ya jugada */
    .cell.played { cursor: default; }

    /* Líneas intermedias del tablero:
       border-right crea las 2 líneas verticales,
       border-bottom crea las 2 líneas horizontales */
    .cell:nth-child(3n+1),
    .cell:nth-child(3n+2) { border-right: 2px solid var(--border); }
    .cell:nth-child(-n+6)  { border-bottom: 2px solid var(--border); }

    /* Pieza (imagen PNG) */
    .cell img {
      width: 68%; height: 68%;
      object-fit: contain;
      animation: pop 0.2s ease-out;
    }

    /* Pieza SVG */
    .cell svg.piece {
      width: 68%; height: 68%;
      animation: pop 0.2s ease-out;
    }

    /* Resalte de celda ganadora */
    .cell.win { animation: win-flash 0.5s ease forwards; }

    /* Canvas para línea ganadora */
    #win-canvas {
      position: absolute;
      top: 0; left: 0;
      pointer-events: none;
      z-index: 5;
    }

    /* botoes */
    .btns {
      display: flex;
      gap: 8px;
      margin-top: 14px;
      width: 315px;
    }

    .btn {
      flex: 1;
      padding: 9px 0;
      border-radius: 7px;
      border: 1.5px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-family: 'Fredoka', sans-serif;
      font-size: 0.88rem;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn:hover { background: #eee; }

    /* Botón primario */
    .btn.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .btn.primary:hover { opacity: 0.88; }

    /* overlay */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.45);
      display: flex; align-items: center; justify-content: center;
      z-index: 50;
      animation: fade 0.25s ease;
    }
    .overlay.hidden { display: none; }

    .overlay-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 28px 32px;
      text-align: center;
      max-width: 300px; width: 100%;
      animation: pop 0.25s ease;
    }

    .overlay-card .icon { font-size: 3rem; margin-bottom: 6px; }
    .overlay-card h2 { font-size: 1.6rem; margin-bottom: 4px; }
    .overlay-card p  { font-size: 0.85rem; color: var(--muted); margin-bottom: 18px; }

    .overlay-card .btns { flex-direction: column; width: 100%; margin-top: 0; }

    /* animaciones */
    @keyframes pop {
      from { transform: scale(0.6); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    @keyframes fade {
      from { opacity: 0; } to { opacity: 1; }
    }

    @keyframes blink {
      0%,100% { opacity: 1; } 50% { opacity: 0.5; }
    }

    @keyframes win-flash {
      0%   { filter: brightness(1); }
      50%  { filter: brightness(1.5); }
      100% { filter: brightness(1.15); }
    }
  </style>
</head>
<body>

  <h1>Tic Tac Toe</h1>

  <div class="config">

    <div class="cfg-group">
      <span>Fichas</span>
      <div class="pair-options">
        <button class="pair-btn active" onclick="selectPair(0)" id="pair-btn-0">🥦 vs 🥕</button>
        <button class="pair-btn"        onclick="selectPair(1)" id="pair-btn-1">⭐ vs 🌙</button>
        <button class="pair-btn"        onclick="selectPair(2)" id="pair-btn-2">🔥 vs 💧</button>
      </div>
    </div>

    <div class="cfg-sep"></div>

    <div class="cfg-group">
      <label for="color-alt">Celdas</label>
      <input type="color" id="color-alt" value="#e8e8e2" oninput="setCellAlt(this.value)" />
    </div>

    <div class="cfg-group">
      <label for="color-win">Línea</label>
      <input type="color" id="color-win" value="#e63946" oninput="setWinColor(this.value)" />
    </div>

  </div>

  <div class="game-bar">
    <div class="score-seg">
      <span id="icon-p1">🥦</span>
      <span id="score-p1" class="score-num">0</span>
    </div>
    <div class="bar-div"></div>
    <div class="timer" id="timer">3:00</div>
    <div class="bar-div"></div>
    <div class="score-seg">
      <span id="score-p2" class="score-num">0</span>
      <span id="icon-p2">🥕</span>
    </div>
  </div>

  <div class="turn-bar" id="turn-bar">Turno de 🥦 J1</div>

  <div class="board-wrap">
    <div class="board" id="board"></div>
    <canvas id="win-canvas"></canvas>
  </div>

  <div class="btns">
    <button class="btn primary" onclick="resetAll()">Reiniciar</button>
  </div>

  <div class="overlay hidden" id="overlay">
    <div class="overlay-card">
      <div class="icon" id="ov-icon">🏆</div>
      <h2 id="ov-title">Ganador</h2>
      <p  id="ov-sub">—</p>
      <div class="btns">
        <button class="btn"         onclick="resetAll();  closeOverlay()">Reiniciar</button>
      </div>
    </div>
  </div>
